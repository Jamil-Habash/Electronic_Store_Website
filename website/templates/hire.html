{% extends "base.html" %}
{% block title %}Employee{% endblock %}
{% block content %}
<form method="POST">
  <h3 align="center">Add Employee</h3>
   <div class="form-group">
    <label for="SSN">SSN</label>
    <input
      type="text"
      class="form-control"
      id="SSN"
      name="SSN"
      placeholder="Enter Employee SSN"
    />
  </div>
  <div class="form-group">
    <label for="empName">Full Name</label>
    <input
      type="text"
      class="form-control"
      id="empName"
      name="empName"
      placeholder="Enter Employee Full Name"
    />
  </div>
  <div class="form-group">
    <label for="empPhoneNumber">Phone Number</label>
    <input
      type="text"
      class="form-control"
      id="empPhoneNumber"
      name="empPhoneNumber"
      placeholder="Enter Employee Phone Number"
    />
  </div>
  <div class="form-group">
    <label for="empAddress">Address</label>
    <input
      type="text"
      class="form-control"
      id="empAddress"
      name="empAddress"
      placeholder="Enter Employee Address"
    />
  </div>
  <div class="form-group">
    <label for="empDateOfBirth">Date Of Birth</label>
    <input
      type="date"
      class="form-control"
      id="empDateOfBirth"
      name="empDateOfBirth"
      placeholder="Enter Employee BirthDay"
    />
  </div>
  <div class="form-group">
    <label for="empEmail">Email Address</label>
    <input
      type="email"
      class="form-control"
      id="empEmail"
      name="empEmail"
      placeholder="Enter Employee Email Address"
    />
  </div>
  <div class="form-group">
    <label for="empPass">Password</label>
    <input
      type="Password"
      class="form-control"
      id="empPass"
      name="empPass"
      placeholder="Enter Employee Password"
    />
  </div>
  <br />
  <button type="submit" class="btn btn-primary">Add</button>
</form>

{% endblock %}
