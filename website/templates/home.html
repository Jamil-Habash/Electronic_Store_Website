{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4" style="color: white;">Home</h1>
    <hr class="border border-2 border-white opacity-75">
    {% if user.Email == "manager@outlook.com" %}
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h2 class="mb-0">Employee Modification</h2>
            </div>
            <div class="card-body bg-secondary text-white ">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"> Manage Employee</h4>
                    <a href="/empManager" class="btn btn-dark btn-lg">
                        <i class="bi bi-plus-circle"></i> Manage
                    </a>
                </div>
            </div>
        </div>
    {% endif %}
</div>
{% endblock %}
