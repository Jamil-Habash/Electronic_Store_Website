{% extends "base.html" %}

{% block title %}
Products
{% endblock %}

{% block content %}
<div class="py-5" style="min-height: 100vh; background: linear-gradient(to right, #000000, #3a3a3a); font-family: 'Segoe UI', sans-serif;">
  <div class="container">
    <h2 class="text-center text-light mb-4">Our Products</h2>

    <!-- Search Bar -->
    <form method="GET" action="{{ url_for('views.products') }}" class="mb-5">
      <div class="input-group shadow">
        <input type="text" name="search" class="form-control bg-dark text-light border-secondary" placeholder="Search products..." value="{{ request.args.get('search', '') }}">
        <button class="btn btn-secondary" type="submit">Search</button>
      </div>
    </form>

    <!-- Product Cards Grid -->
    <div class="row g-4">
      {% for product in products %}
      <div class="col-12 col-sm-6 col-md-4 mb-4 d-flex">
        <a href="{{ url_for('views.product_detail', product_id=product.Product_ID) }}" class="text-decoration-none text-reset w-100 h-100">
          <div class="card product-card bg-dark text-light border-0 shadow h-100">
            <img src="{{ url_for('views.product_image', product_id=product.Product_ID) }}"
                 class="card-img-top"
                 style="height: 230px; object-fit: cover; border-top-left-radius: 12px; border-top-right-radius: 12px;">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">{{ product.model.Model_Name }}</h5>
              <p class="card-text text-muted">{{ product.Descriptions[:90] }}...</p>
              <h6 class="text-warning mt-auto">${{ product.Price }}</h6>
            </div>
          </div>
        </a>
      </div>
      {% else %}
      <div class="col-12 text-center text-light">No products found.</div>
      {% endfor %}
    </div>
  </div>
</div>

<!-- CSS -->
<style>
.product-card {
  border-radius: 12px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
}
.product-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 24px rgba(255, 255, 255, 0.15);
}
</style>
{% endblock %}
