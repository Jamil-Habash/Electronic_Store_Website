{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}

<style>
    .form-control::placeholder {
        color: #bbb;
        font-style: italic;
    }
    .form-control:focus {
        background-color: #2c2c2c;
        color: #fff;
        border-color: #6c757d;
    }
    label {
        color: #ccc;
    }
    .info-box {
        background-color: #1a1a1a;
        border: 1px solid #333;
        padding: 1rem;
        border-radius: 10px;
        color: #aaa;
        margin-bottom: 2rem;
    }
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-dark text-white p-4 rounded shadow-lg">
            <!-- Optional info -->
            <div class="info-box mb-4 text-center">
                <h5 class="text-light">Welcome back, {{customer.Full_Name }} 👋</h5>
                <p class="mb-0">Update your Profile info below.</p>
            </div>

            <!-- Profile Update Form -->
            <form method="POST" action="/profile" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-control bg-secondary text-white" id="name" name="Full_Name"
                      value="{{ customer.Full_Name }}" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control bg-secondary text-white" id="email" name="Email"
                        value="{{ customer.Email }}" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" class="form-control bg-secondary text-white" id="phone" name="Phone_Number"
                        value="{{ customer.Phone_Number }}" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea class="form-control bg-secondary text-white" id="address" name="Address" rows="2"
                        placeholder="Enter your address">{{ customer.Address }}</textarea>
                </div>
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" class="form-control bg-secondary text-white" id="password" name="Pass"
                         value="{{ customer.Pass }}"placeholder="Enter new password">
                </div>
                <button type="submit" class="btn btn-outline-light mt-3 w-100">Update Profile</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
